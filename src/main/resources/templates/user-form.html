<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>User Form</title>
</head>
<body>
<h1 th:text="${user.id} != null ? 'Edit User' : 'Add User'">User Form</h1>

<form th:action="@{/admin/saveUser}" method="post">
  <input type="hidden" name="id" th:value="${user.id}" th:if="${user.id} != null">

  <label>Name:</label>
  <input type="text" name="name" th:value="${user.name}" required><br>

  <label>Email:</label>
  <input type="email" name="email" th:value="${user.email}" required><br>

  <label>Age:</label>
  <input type="number" name="age" th:value="${user.age}" required><br>

  <label>Password:</label>
  <input type="password" name="password"
         th:placeholder="${user.id} != null ? 'Leave blank to keep current' : ''"
         th:required="${user.id} == null"><br>

  <!-- ВЫБОР РОЛЕЙ -->
  <div style="margin: 10px 0;">
    <label>Roles:</label>
    <div th:each="role : ${allRoles}">
      <input type="checkbox" name="roleIds" th:value="${role.id}"
             th:checked="${user.roles != null && user.roles.contains(role)}" />
      <label th:text="${role.name}"></label>
    </div>
  </div>

  <button type="submit">Save</button>
  <a th:href="@{/admin/users}">Cancel</a>
</form>
</body>
</html>
